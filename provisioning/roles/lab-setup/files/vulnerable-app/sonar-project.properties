# SonarQube project configuration
# Place this file at the root of the directory you want to scan.

sonar.projectKey=sast-lab-vulnerable-app
sonar.projectName=SAST Lab — Vulnerable Python App
sonar.projectVersion=1.0

# Source root relative to this file
sonar.sources=.

sonar.sourceEncoding=UTF-8
sonar.language=py

# Exclude virtual envs, caches, and test scaffolding
sonar.exclusions=**/.venv/**,**/node_modules/**,**/__pycache__/**,**/vendor/**,**/*.pyc

# Python-specific: point to the installed Python binary so sonar-scanner
# can resolve imports (optional but improves analysis accuracy)
sonar.python.version=3
