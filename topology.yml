---


name: "sast-lab"

hosts:
  - name: toolbox
    base_box:
      # Ubuntu 22.04 LTS — verify name with: openstack image list
      image: ubuntu-jammy-server-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    flavor: m1.large

networks:
  - name: management-net
    cidr: "10.100.0.0/24"
    dhcp: true

routers: []

provisioning:
  - scope: host
    hosts:
      - toolbox
    playbook: provisioning/site.yaml
