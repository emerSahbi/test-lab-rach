name: sast-lab

hosts:
  - name: toolbox
    base_box:
      image: ubuntu-jammy-server-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    flavor: m1.large

networks:
  - name: management-net
    cidr: 10.100.0.0/24

provisioning:
  - scope: host
    hosts:
      - toolbox
    playbook: provisioning/site.yaml
