---


name: "sast-lab"

hosts:
  - name: toolbox
    base_box:
      image: Sast-training-img
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    flavor: m1.large

networks:
  - name: management-net
    cidr: "10.100.0.0/24"


provisioning:
  - scope: host
    hosts:
      - toolbox
    playbook: provisioning/site.yaml
